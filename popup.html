<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400, initial-scale=1.0">
  <title>BuffaloFocus</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Animated Background Elements -->
  <div class="bg-animations">
    <div class="cloud cloud-1">☁️</div>
    <div class="cloud cloud-2">☁️</div>
    <div class="cloud cloud-3">☁️</div>
    <div class="star star-1">✦</div>
    <div class="star star-2">✦</div>
    <div class="star star-3">✦</div>
    <div class="star star-4">✦</div>
    <div class="star star-5">✦</div>
    <div class="flower flower-1">🌸</div>
    <div class="flower flower-2">🌼</div>
    <div class="flower flower-3">🌷</div>
    <div class="flower flower-4">🌻</div>
    <div class="flower flower-5">🌺</div>
  </div>

  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="mascot-container">
        <img src="icons/icon128.png" alt="Buffalo Mascot" class="mascot" id="mascot">
      </div>
      <h1 class="title">BuffaloFocus</h1>
      <p class="subtitle">Your CU Boulder Study Buddy 🦬</p>
    </header>

    <!-- Start Screen (shown when no active session) -->
    <div id="startScreen" class="screen">
      <div class="card glass-card">
        <h2 class="card-title">What are you studying?</h2>
        <div class="input-group">
          <input 
            type="text" 
            id="subjectInput" 
            class="subject-input" 
            placeholder="e.g. Calculus, History, CS..."
            autocomplete="off"
          >
          <div class="quick-subjects">
            <button class="quick-btn" data-subject="Math">📐 Math</button>
            <button class="quick-btn" data-subject="Science">🔬 Science</button>
            <button class="quick-btn" data-subject="English">📝 English</button>
            <button class="quick-btn" data-subject="CS">💻 CS</button>
            <button class="quick-btn" data-subject="History">📜 History</button>
            <button class="quick-btn" data-subject="Art">🎨 Art</button>
          </div>
        </div>
        <button id="startBtn" class="btn btn-primary">
          <span class="btn-icon">🚀</span> Start Focus Session
        </button>
      </div>

      <!-- Settings -->
      <div class="card glass-card settings-card">
        <button id="settingsToggle" class="settings-toggle">
          ⚙️ Settings
          <span class="toggle-arrow">▼</span>
        </button>
        <div id="settingsPanel" class="settings-panel hidden">
          <div class="setting-row">
            <label>Same tab alert (min)</label>
            <input type="number" id="sameTabTimeout" class="setting-input" min="1" max="120" value="30">
          </div>
          <div class="setting-row">
            <label>Idle alert (min)</label>
            <input type="number" id="idleTimeout" class="setting-input" min="1" max="60" value="5">
          </div>
          <button id="saveSettingsBtn" class="btn btn-secondary">Save Settings</button>
        </div>
      </div>
    </div>

    <!-- Active Session Screen -->
    <div id="sessionScreen" class="screen hidden">
      <div class="card glass-card session-card">
        <div class="session-status">
          <div class="pulse-dot"></div>
          <span class="status-text">FOCUSING</span>
        </div>
        <h2 class="session-subject" id="sessionSubject">Calculus</h2>
        
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon">⏱️</div>
            <div class="stat-value" id="sessionTime">0:00</div>
            <div class="stat-label">Session Time</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">📑</div>
            <div class="stat-value" id="tabTime">0:00</div>
            <div class="stat-label">Current Tab</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">🖱️</div>
            <div class="stat-value" id="lastActivity">Active</div>
            <div class="stat-label">Activity</div>
          </div>
        </div>

        <div class="buffalo-message" id="buffaloMessage">
          <span class="message-icon">🦬</span>
          <span class="message-text">Let's crush it! Stay focused!</span>
        </div>

        <button id="stopBtn" class="btn btn-danger">
          <span class="btn-icon">⏹️</span> End Session
        </button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
