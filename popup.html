<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusGuard</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <span class="logo-icon">🛡️</span>
        <h1>FocusGuard</h1>
      </div>
      <p class="tagline">Stay on track. Stay productive.</p>
    </header>

    <!-- Setup Screen -->
    <section id="setup-screen" class="screen">
      <div class="input-group">
        <label for="subject-input">What are you focusing on?</label>
        <input type="text" id="subject-input" placeholder="e.g. Calculus, CS Project, Essay..." autocomplete="off">
      </div>
      <button id="start-btn" class="btn btn-primary">
        <span class="btn-icon">▶</span> Start Focus Session
      </button>
    </section>

    <!-- Active Session Screen -->
    <section id="session-screen" class="screen hidden">
      <div class="session-info">
        <div class="subject-badge" id="current-subject"></div>
        <div class="timer-display">
          <span class="timer-label">Focused for</span>
          <span class="timer-value" id="session-timer">00:00:00</span>
        </div>
      </div>

      <div class="stats-row">
        <div class="stat-card">
          <span class="stat-value" id="alerts-count">0</span>
          <span class="stat-label">Alerts</span>
        </div>
        <div class="stat-card">
          <span class="stat-value" id="blocked-visits">0</span>
          <span class="stat-label">Distractions</span>
        </div>
        <div class="stat-card">
          <span class="stat-value" id="idle-count">0</span>
          <span class="stat-label">Idle Warns</span>
        </div>
      </div>

      <div class="status-indicator" id="status-indicator">
        <span class="status-dot"></span>
        <span class="status-text">Monitoring active</span>
      </div>

      <button id="stop-btn" class="btn btn-danger">
        <span class="btn-icon">⏹</span> End Session
      </button>
    </section>

    <footer>
      <p>HackCU 12 🏔️</p>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
