<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuffaloFocus - Get Back to Work!</title>
  <link rel="stylesheet" href="notification.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bg-animations">
    <div class="cloud cloud-1">☁️</div>
    <div class="cloud cloud-2">☁️</div>
    <div class="star star-1">✦</div>
    <div class="star star-2">✦</div>
    <div class="star star-3">✦</div>
  </div>

  <div class="notification-container">
    <div class="notification-card">
      <div class="mascot-wrapper">
        <img src="icons/icon128.png" alt="Buffalo Mascot" class="notification-mascot">
      </div>
      <h1 class="notification-title" id="notifTitle">🦬 Hey, Buff!</h1>
      <p class="notification-message" id="notifMessage">Looks like you've drifted off track. Time to get back to studying!</p>
      <div class="notification-actions">
        <button class="btn btn-gold" id="backToWorkBtn">
          💪 Back to Work!
        </button>
        <button class="btn btn-outline" id="breakBtn">
          ☕ 5 Min Break
        </button>
      </div>
      <p class="notification-quote" id="notifQuote">"Be Boulder." — CU Buffalo Spirit 🏔️</p>
    </div>
  </div>

  <script src="notification.js"></script>
</body>
</html>
